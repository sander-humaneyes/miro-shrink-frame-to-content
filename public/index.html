<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shrink frame to content</title>
    <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
    <script src="index.js" defer></script>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "Segoe UI Variable", sans-serif;
        --ink: #1f1f1f;
        --muted: #6b7280;
        --line: #e6e8eb;
        --surface: #ffffff;
        --surface-subtle: #f6f7f9;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--surface-subtle);
        color: var(--ink);
      }

      main {
        width: min(560px, calc(100vw - 40px));
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--surface);
      }

      .label {
        margin: 0 0 12px;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--muted);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 2.4rem);
        line-height: 1.08;
      }

      p {
        margin: 0;
        font-size: 1rem;
        line-height: 1.6;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="label">Miro Web SDK app</p>
      <h1>Shrink frame to content</h1>
      <p>
        Miro loads this page in a background iframe. Install the app inside Miro
        to open the panel and shrink selected frames around their contents.
      </p>
    </main>
  </body>
</html>
