<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shrink frame to content</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
    <script src="auto-frames.js" defer></script>
    <script src="panel.js" defer></script>
  </head>
  <body>
    <div class="panel-shell">
      <section class="panel-section">
        <div class="row">
          <span class="section-label">Selected frames</span>
          <span class="frame-badge" id="frame-count" data-active="false">0</span>
        </div>
        <p class="selection-state" id="selection-status">Select one or more frames.</p>
      </section>

      <section class="panel-section">
        <label class="control-row" for="padding-input">
          <span class="section-label">Padding</span>
          <span class="input-chip">
            <input id="padding-input" type="number" min="0" max="200" step="4" value="32" />
            <span class="input-suffix">dp</span>
          </span>
        </label>
        <button class="button" id="fit-button" type="button">Shrink</button>
      </section>

      <details class="logs-disclosure" id="logs-disclosure">
        <summary>
          <span class="section-label section-label--strong">Activity</span>
          <span class="logs-meta">
            <span id="result-summary">Nothing yet</span>
            <span class="disclosure-icon" aria-hidden="true"></span>
          </span>
        </summary>
        <ul class="results" id="result-list"></ul>
      </details>
    </div>
  </body>
</html>
