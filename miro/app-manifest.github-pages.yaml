appName: Shrink frame to content
sdkVersion: SDK_V2
# Replace BOTH placeholders before pasting this into Miro:
# - YOUR-DOMAIN: the Pages domain only, for example yourname.github.io
# - YOUR-REPOSITORY-NAME: the repository path portion
sdkUri: https://YOUR-DOMAIN/YOUR-REPOSITORY-NAME/index.html
boardPicker:
  allowedDomains:
    - YOUR-DOMAIN
scopes:
  - boards:read
  - boards:write
icons:
  colored: >-
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
    fill="none" stroke="#1F1F1F" stroke-width="1.8" stroke-linecap="round"
    stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17"
    rx="3"/><path d="M6.25 6.25 10.25 10.25"/><path d="M6.75 10.25H10.25V6.75"/>
    <path d="M17.75 17.75 13.75 13.75"/><path d="M17.25 13.75H13.75V17.25"/></svg>
  outline: >-
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
    fill="none" stroke="#1F1F1F" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5"
    width="17" height="17" rx="3"/><path d="M6.25 6.25 10.25 10.25"/><path
    d="M6.75 10.25H10.25V6.75"/><path d="M17.75 17.75 13.75 13.75"/><path
    d="M17.25 13.75H13.75V17.25"/></svg>
